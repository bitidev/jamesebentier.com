name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      non_docs: ${{ steps.filter.outputs.non_docs }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            non_docs:
              - '!docs/**'

  danger:
    name: Danger
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.non_docs == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - uses: MeilCli/danger-action@v6
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          plugins_file: 'Gemfile'
          danger_file: 'Dangerfile'
          danger_id: 'danger-pr'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: RuboCop
        run: bundle exec rubocop

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_PASSWORD: postgres
    env:
      RUBY_YJIT_ENABLE: 1
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          cache: yarn
      - name: Install Node modules
        run: yarn install --frozen-lockfile
      # ubuntu-latest ships Chrome preinstalled, which Ferrum (Cuprite's driver,
      # used by spec/system/**) auto-detects with no extra setup in the common
      # case -- this step is a defensive pin so a future runner-image change
      # can't silently break the browser system specs. See docs/specs/
      # 1187-modal-vim-keyboard-navigation.md (Testing Strategy, Open Question 2).
      - name: Setup Chrome for Cuprite system specs
        id: setup_chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: false
      - name: Run JS unit tests (Vitest)
        run: yarn test:js
      - name: Run Tests
        env:
          DATABASE_HOST: localhost
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          RAILS_ENV: test
          SECRET_KEY_BASE: we-dont-need-a-secret-here
          CI: true
          # Points Cuprite/Ferrum at the exact Chromium binary browser-actions/
          # setup-chrome just installed (path is version-dependent -- read from
          # the action's output rather than hardcoded) -- see spec/support/
          # capybara.rb.
          CUPRITE_CHROME_PATH: ${{ steps.setup_chrome.outputs.chrome-path }}
        run: |
          bundle exec rake assets:precompile
          bundle exec rake db:prepare
          bundle exec rake spec

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detection failed (changes=${{ needs.changes.result }}); failing closed."
            exit 1
          fi
          if [ "${{ needs.changes.outputs.non_docs }}" != "true" ]; then
            echo "Docs-only change detected; no required CI jobs needed. Reporting success."
            exit 0
          fi
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "Required CI jobs failed (lint=${{ needs.lint.result }}, test=${{ needs.test.result }})"
            exit 1
          fi
          echo "All required CI jobs passed."
